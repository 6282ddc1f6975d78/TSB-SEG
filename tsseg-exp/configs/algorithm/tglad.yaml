name: tglad
task: change_point

instance:
  _target_: tsseg.algorithms.tglad.detector.TGLADDetector

  window_size: 32 # should be set using MWF (see paper)
  stride: 16 # should depend on window size
  batch_size: 8
  threshold: 0.5 # should be tuned
  min_spacing: null
  epochs: 100 # should be tuned
  learning_rate: 0.001
  glad_iterations: 5 # should be tuned
  eval_offset: 0.1

tunable_parameters:
  - window_size: [32, 64, 128]
  - threshold: [0.1, 0.3, 0.5]
  - epochs: [100, 500]