# configs/hydra/launcher/submitit_gpu_a100.yaml
# ── SLURM launcher targeting A100 GPUs (80 GB) ────────────────────────
# Nodes gpu01[2-13]: 4× A100, 16 cpus/gpu, partition gpu (max 2 days)
# Priority partitions: willow (gpu012-013, gpu017)
#
# Usage:
#   python src/tsseg_exp/main.py hydra/launcher=submitit_gpu_a100 ...

# @package hydra.launcher
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher

submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 2880              # 2 days (gpu partition max)
cpus_per_task: 16
gpus_per_node: 1
tasks_per_node: 1
mem_gb: 64
nodes: 1
name: ${hydra.job.name}
stderr_to_stdout: false

partition: gpu
signal_delay_s: 120
max_num_timeout: 0
additional_parameters:
  constraint: a100
array_parallelism: 256

setup:
  - "export SLURM_CPU_BIND=none"
  - "export OMP_NUM_THREADS=16"
  - "export MKL_NUM_THREADS=16"
