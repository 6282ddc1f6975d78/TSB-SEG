# configs/hydra/launcher/slurm.yaml
# ── SLURM launcher for Hydra Submitit ─────────────────────────────────
#
# Usage:
#   python src/tsseg_exp/main.py hydra/launcher=slurm ...
#
# MLflow tracking URI is propagated from the current environment
# so that workers log to the same server as the controller.

# @package hydra.launcher
_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher

# ── BaseQueueConf defaults ─────────────────────
submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 1440
cpus_per_task: 8
gpus_per_node: 0
tasks_per_node: 1
mem_gb: 32
nodes: 1
name: ${hydra.job.name}
stderr_to_stdout: false

# ── Slurm-specific ─────────────────────────────
partition: cpu_homogen
signal_delay_s: 120
max_num_timeout: 0
additional_parameters: {}
array_parallelism: 256

setup:
  - "export SLURM_CPU_BIND=none"
  - "export OMP_NUM_THREADS=8"
  - "export MKL_NUM_THREADS=8"
  # MLflow URI is auto-discovered by each worker from .env / TSSEG_MLFLOW_DIR.
  # Override below only if you need to force a specific URI for workers:
  # - "export MLFLOW_TRACKING_URI='http://<node>:15050'"